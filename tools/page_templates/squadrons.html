    <main class="app-shell" id="main">
      <section class="view is-active" id="squadronsView" data-view>
        <div class="squadrons-experience">
          <section class="squadron-archive-hero" aria-labelledby="squadronsTitle">
            <div class="squadron-archive-media" id="squadronHeroMedia" aria-hidden="true"></div>
            <div class="squadron-archive-scrim" aria-hidden="true"></div>
            <div class="squadron-archive-copy"><p class="eyebrow">Unit markings archive</p><h1 id="squadronsTitle">Squadrons</h1><p>Insignia, aircraft, and photographic records from units across the collection.</p></div>
            <dl class="squadron-archive-stats" aria-label="Squadron collection overview"><div><dt>Units</dt><dd id="squadronPageCount">0</dd></div><div><dt>Countries</dt><dd id="squadronHeroCountryCount">0</dd></div><div><dt>Frames</dt><dd id="squadronHeroPhotoCount">0</dd></div></dl>
          </section>
          <section class="squadron-directory" aria-label="Squadron logo gallery">
            <div class="squadron-command-bar">
              <label class="squadron-mobile-search" for="squadronSearch"><span class="field-label">Find a unit</span><input class="search-input" id="squadronSearch" type="search" autocomplete="off" placeholder="Squadron, aircraft, or country"></label>
              <div class="squadron-country-rail" aria-label="Browse by country"><p class="eyebrow">Country</p><nav id="squadronCountryRail" class="squadron-country-nav"></nav></div>
            </div>
            <div class="squadron-country-list" id="squadronLogoGrid"></div>
            <div class="archive-pagination" id="squadronPagination" aria-live="polite"></div>
          </section>
        </div>
      </section>
      <section class="view detail-view" id="squadronDetailView" data-view hidden>
        <article class="detail-page" id="squadronDetail" aria-live="polite"></article>
      </section>
    </main>
