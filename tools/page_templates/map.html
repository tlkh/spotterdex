    <main class="app-shell" id="main">
      <section class="view is-active" id="mapView" data-view>
        <div class="workspace map-workspace">
          <button class="mobile-map-photos-card" type="button" data-map-panel-toggle="results" aria-controls="mapResults" aria-expanded="false" aria-label="Open photos for the selected location" disabled>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3.5" y="5" width="17" height="14" rx="2"></rect>
              <circle cx="9" cy="10" r="1.5"></circle>
              <path d="m5.5 17 4.2-4 3.1 2.6 2.5-2.2 3.2 3.6"></path>
            </svg>
            <strong id="mobileMapPhotoCount">0</strong>
            <span>Photos</span>
            <small id="mobileMapPhotoLocation">No location selected</small>
          </button>
          <div class="mobile-map-location-nav" aria-label="Recent location navigation">
            <button type="button" data-location-nav="older" aria-label="Older recent location" title="Older recent location" disabled>
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="m14.5 5-7 7 7 7"></path></svg>
            </button>
            <button type="button" data-location-nav="newer" aria-label="Newer recent location" title="Newer recent location" disabled>
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="m9.5 5 7 7-7 7"></path></svg>
            </button>
          </div>
          <button class="map-panel-toggle map-panel-toggle-locations" type="button" data-map-panel-toggle="locations" aria-controls="mapControlPanel" aria-expanded="false">Locations</button>
          <button class="map-panel-toggle map-panel-toggle-results" type="button" data-map-panel-toggle="results" aria-controls="mapResults" aria-expanded="false">Photos</button>
          <button class="map-panel-backdrop" type="button" data-map-panel-close aria-label="Close map panel"></button>
          <div class="map-panel-coach" id="mapPanelCoach" role="status" hidden>
            <p>Tap <strong>Locations</strong> to browse pins, or select a marker to open <strong>Photos</strong>.</p>
            <button class="plain-button map-panel-coach-dismiss" type="button" id="mapPanelCoachDismiss">Got it</button>
          </div>
          <aside class="control-panel" id="mapControlPanel" aria-label="Timothy Liu overview">
            <div class="map-sheet-bar">
              <button class="map-sheet-handle" type="button" data-sheet-handle="map" aria-label="Expand Locations panel" aria-expanded="false"></button>
              <strong>Locations</strong>
              <button class="map-sheet-close" type="button" data-map-panel-close aria-label="Close Locations panel">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18"></path></svg>
              </button>
            </div>
            <p class="eyebrow">Spotting logbook</p>
            <h1>Timothy Liu</h1>
            <div class="stat-grid" aria-label="Collection summary">
              <div><span class="stat-value" id="aircraftCount">0</span><span class="stat-label">Aircraft</span></div>
              <div><span class="stat-value" id="photoCount">0</span><span class="stat-label">Photos</span></div>
              <div><span class="stat-value" id="locationCount">0</span><span class="stat-label">Locations</span></div>
            </div>
            <label class="field-label" for="locationSearch">Find a location</label>
            <input class="search-input" id="locationSearch" type="search" autocomplete="off" placeholder="Search map pins">
            <div class="panel-heading">
              <h2>Recent Locations</h2>
              <button class="plain-button" type="button" id="fitPinsPanelButton" aria-label="Fit all map locations">Fit All</button>
            </div>
            <div class="location-list" id="locationList" aria-live="polite"></div>
          </aside>
          <div class="map-column">
            <section class="map-stage" aria-label="World map with aircraft spotting pins">
              <div class="world-map" id="worldMap" role="img" aria-label="Dark world map showing aircraft spotting locations"></div>
              <p class="map-fallback" id="mapFallback" hidden><span>Map tiles require a connection. Cached locations remain available.</span><a href="aircraft-dex.html">Browse Aircraft Dex</a></p>
            </section>
            <section class="results-panel" id="mapResults" aria-live="polite"></section>
          </div>
        </div>
      </section>
      <section class="view detail-view" id="locationDetailView" data-view hidden>
        <article class="detail-page" id="locationDetail" aria-live="polite"></article>
      </section>
    </main>
