<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#111416">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SpotterDex">
    <title>Airshows | SpotterDex</title>
    <meta name="description" content="Browse SpotterDex airshow field reports and event photography.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="SpotterDex">
    <meta property="og:locale" content="en_SG">
    <meta property="og:title" content="Airshows | SpotterDex">
    <meta property="og:description" content="Chronological field reports from displays, rehearsals, and aviation gatherings.">
    <meta property="og:image" content="https://tlkh.github.io/spotterdex/assets/generated/photos/location-hero-gifu-air-base.jpg">
    <meta property="og:url" content="https://tlkh.github.io/spotterdex/airshows.html">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Airshows | SpotterDex">
    <meta name="twitter:description" content="Chronological field reports from displays, rehearsals, and aviation gatherings.">
    <meta name="twitter:image" content="https://tlkh.github.io/spotterdex/assets/generated/photos/location-hero-gifu-air-base.jpg">
    <link rel="canonical" href="https://tlkh.github.io/spotterdex/airshows.html">
    <link rel="icon" type="image/png" href="assets/icons/spotterdex-app-icon.png">
    <link rel="apple-touch-icon" href="assets/icons/spotterdex-app-icon.png">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
    <script src="data/spotterdex-data.js" defer></script>
    <script src="script.js" defer></script>
  </head>
  <body data-page-view="airshowsView">
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <a class="brand" href="index.html" aria-label="SpotterDex home">
        <span class="brand-mark" aria-hidden="true"><img src="assets/icons/spotterdex-app-icon.png" alt=""></span>
        <span><span class="brand-title">SpotterDex</span><span class="brand-subtitle">Timothy's Logbook</span></span>
      </a>
      <nav class="tab-nav" aria-label="Main views">
        <a class="tab-button" href="index.html">World Map</a>
        <a class="tab-button" href="aircraft-dex.html">Aircraft Dex</a>
        <a class="tab-button" href="squadrons.html">Squadrons</a>
        <a class="tab-button is-active" href="airshows.html" aria-current="page">Airshows</a>
        <a class="tab-button" href="stats.html">Stats</a>
      </nav>
      <select class="nav-select" id="viewSelect" aria-label="Main view">
        <option value="index.html">World Map</option>
        <option value="aircraft-dex.html">Aircraft Dex</option>
        <option value="squadrons.html">Squadrons</option>
        <option value="airshows.html" selected>Airshows</option>
        <option value="stats.html">Stats</option>
      </select>
    </header>

    <main class="app-shell" id="main">
      <section class="view is-active" id="airshowsView" data-view>
        <div class="airshows-experience">
          <section class="airshow-archive-hero" aria-labelledby="airshowsTitle">
            <div class="airshow-archive-media" id="airshowHeroMedia" aria-hidden="true"></div>
            <div class="airshow-archive-scrim" aria-hidden="true"></div>
            <div class="airshow-archive-copy">
              <p class="eyebrow">Event photography archive</p>
              <h1 id="airshowsTitle">Airshows</h1>
              <p>Chronological field reports from displays, rehearsals, and aviation gatherings.</p>
            </div>
            <dl class="airshow-archive-stats" aria-label="Airshow collection overview">
              <div><dt>Events</dt><dd id="airshowPageCount">0</dd></div>
              <div><dt>Frames</dt><dd id="airshowHeroPhotoCount">0</dd></div>
              <div><dt>Locations</dt><dd id="airshowHeroLocationCount">0</dd></div>
            </dl>
          </section>
          <section class="airshow-directory" aria-label="Airshow archive">
            <div class="airshow-command-bar">
              <p class="eyebrow">Event chronology</p>
              <p id="airshowYearRange">Archive dates unavailable</p>
            </div>
            <section class="airshow-timeline" id="airshowTimeline" aria-live="polite"></section>
            <div class="archive-pagination" id="airshowPagination" aria-live="polite"></div>
          </section>
        </div>
      </section>
      <section class="view detail-view" id="airshowDetailView" data-view hidden>
        <article class="detail-page" id="airshowDetail" aria-live="polite"></article>
      </section>
    </main>
  </body>
</html>
