<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#111416">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SpotterDex">
    <title>Stats | SpotterDex</title>
    <meta name="description" content="Explore collection totals and camera metadata from the SpotterDex archive.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="SpotterDex">
    <meta property="og:locale" content="en_SG">
    <meta property="og:title" content="Stats | SpotterDex">
    <meta property="og:description" content="Collection totals and camera metadata from the SpotterDex archive.">
    <meta property="og:image" content="https://tlkh.github.io/spotterdex/assets/generated/photos/location-hero-gifu-air-base.jpg">
    <meta property="og:url" content="https://tlkh.github.io/spotterdex/stats.html">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Stats | SpotterDex">
    <meta name="twitter:description" content="Collection totals and camera metadata from the SpotterDex archive.">
    <meta name="twitter:image" content="https://tlkh.github.io/spotterdex/assets/generated/photos/location-hero-gifu-air-base.jpg">
    <link rel="canonical" href="https://tlkh.github.io/spotterdex/stats.html">
    <link rel="icon" type="image/png" href="assets/icons/spotterdex-app-icon.png">
    <link rel="apple-touch-icon" sizes="180x180" type="image/png" href="assets/icons/spotterdex-apple-touch-icon-v3.png">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
    <script src="data/spotterdex-data.js" defer></script>
    <script src="script.js" defer></script>
  </head>
  <body data-page-view="statsView">
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <a class="brand" href="index.html" aria-label="SpotterDex home">
        <span class="brand-mark" aria-hidden="true"><img src="assets/icons/spotterdex-app-icon.png" alt=""></span>
        <span><span class="brand-title">SpotterDex</span><span class="brand-subtitle">Timothy's Logbook</span></span>
      </a>
      <nav class="tab-nav" aria-label="Main views">
        <a class="tab-button" href="index.html">World Map</a>
        <a class="tab-button" href="aircraft-dex.html">Aircraft Dex</a>
        <a class="tab-button" href="squadrons.html">Squadrons</a>
        <a class="tab-button" href="airshows.html">Airshows</a>
        <a class="tab-button is-active" href="stats.html" aria-current="page">Stats</a>
      </nav>
      <select class="nav-select" id="viewSelect" aria-label="Main view">
        <option value="index.html">World Map</option>
        <option value="aircraft-dex.html">Aircraft Dex</option>
        <option value="squadrons.html">Squadrons</option>
        <option value="airshows.html">Airshows</option>
        <option value="stats.html" selected>Stats</option>
      </select>
    </header>

    <main class="app-shell" id="main">
      <section class="view is-active" id="statsView" data-view>
        <div class="stats-experience">
          <section class="stats-archive-hero" aria-labelledby="statsArchiveTitle">
            <div class="stats-archive-media" id="statsHeroMedia" aria-hidden="true"></div>
            <div class="stats-archive-scrim" aria-hidden="true"></div>
            <div class="stats-archive-copy">
              <p class="eyebrow">Collection telemetry</p>
              <h1 id="statsArchiveTitle">Stats</h1>
              <p>A live reading of the airframes, places, and camera settings behind the archive.</p>
            </div>
            <dl class="stats-archive-metrics" aria-label="Collection totals">
              <div><dt>Frames</dt><dd id="statsHeroPhotoCount">0</dd></div>
              <div><dt>Types</dt><dd id="statsHeroAircraftCount">0</dd></div>
              <div><dt>Locations</dt><dd id="statsHeroLocationCount">0</dd></div>
            </dl>
          </section>
          <nav class="stats-section-nav" id="statsSectionNav" aria-label="Stats sections">
            <button class="is-active" type="button" data-stats-section="summary" aria-pressed="true">Overview</button>
            <button type="button" data-stats-section="exif" aria-pressed="false">Camera data</button>
          </nav>
          <div class="stats-directory">
            <header class="stats-directory-heading">
              <p class="eyebrow">Archive overview</p>
              <p>Live from the generated collection manifest</p>
            </header>
            <section class="stats-hero" aria-label="Collection statistics">
              <div class="stats-dashboard-grid" id="statsDashboard"></div>
            </section>
            <section class="exif-dashboard" id="exifDashboard" aria-live="polite"></section>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
